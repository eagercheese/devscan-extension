<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEVScan Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="popup-main" class="devscan-popup-main">
    <div class="devscan-logo-container">
      <img src="../assets/devscan-logo.png" alt="DEVScan Logo" class="devscan-logo" />
    </div>
    <div class="devscan-toggle-list">
      <div class="devscan-toggle-row">
        <label class="devscan-switch">
          <input type="checkbox" id="toggle-blocking" />
          <span class="devscan-slider"></span>
        </label>
        <span class="devscan-toggle-label">Enable Page Blocking</span>
      </div>
      <div class="devscan-toggle-row">
        <label class="devscan-switch">
          <input type="checkbox" id="toggle-warnings" />
          <span class="devscan-slider"></span>
        </label>
        <span class="devscan-toggle-label">Show Warnings Only</span>
      </div>
      <div class="devscan-toggle-row">
        <label class="devscan-switch">
          <input type="checkbox" id="toggle-logging" />
          <span class="devscan-slider"></span>
        </label>
        <span class="devscan-toggle-label">Log Detection Events</span>
      </div>
      <div class="devscan-toggle-row">
        <label class="devscan-switch">
          <input type="checkbox" id="toggle-blocking2" />
          <span class="devscan-slider"></span>
        </label>
        <span class="devscan-toggle-label">Enable Page Blocking</span>
      </div>
    </div>
    <div class="devscan-quote">
      “Stay secure. Stay aware. Stay ahead.”<br />
      <span class="devscan-quote-author">-Rjay Manaloto-</span>
    </div>
    <div class="devscan-footer">
      Message us for Inquiries!<br />
      <a href="https://www.DEVscan.com" target="_blank">www.DEVscan.com</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
